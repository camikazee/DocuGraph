# Pełny stack DocuGraph do podglądu: `docker compose up --build`
# → frontend na http://localhost:3002, backend (API) na http://localhost:3000/api/v1
# Obrazy budowane są z etapu `prod` (multi-stage) w backend/Dockerfile i frontend/Dockerfile.
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    # Brak mapowania portu na host — uniknięcie konfliktu z innymi kontenerami.
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/docugraph
      JWT_SECRET: dev-docker-secret-change-me-0123456789abcdef
      JWT_EXPIRES_IN: 1d
      CORS_ORIGINS: http://localhost:3002
      WORKSPACE_ROOT: /data/workspaces
      APP_URL: http://localhost:3002
      # Maile transakcyjne (reset hasła) → Mailpit (dev). Podgląd na :8025.
      SMTP_HOST: mailpit
      SMTP_PORT: '1025'
      SMTP_FROM: DocuGraph <no-reply@docugraph.local>
    volumes:
      - workspace-data:/data/workspaces
    ports:
      - '3000:3000'
    depends_on:
      mongo:
        condition: service_healthy

  # Łapacz maili dla dev — SMTP na :1025, podgląd web/API na :8025.
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - '8025:8025'

  frontend:
    build:
      context: ./frontend
      target: prod
      args:
        # Adres backendu widziany z przeglądarki (host).
        NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
    restart: unless-stopped
    ports:
      - '3002:3000'
    depends_on:
      - backend

volumes:
  mongo-data:
  workspace-data:
